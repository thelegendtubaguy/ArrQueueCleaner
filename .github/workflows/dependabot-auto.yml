name: Auto-approve trusted PRs and Dependabot dev updates

on:
  pull_request:

permissions:
  contents: write
  pull-requests: write

jobs:
  auto-approve-and-merge:
    name: Auto approve trusted PRs and Dependabot dev updates
    runs-on: ubuntu-latest
    steps:
      - name: Dependabot metadata
        id: metadata
        if: github.event.pull_request.user.login == 'dependabot[bot]'
        uses: dependabot/fetch-metadata@25dd0e34f4fe68f24cc83900b1fe3fe149efef98
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Approve trusted owner and dev dependency PRs
        if: github.event.pull_request.user.login == 'thelegendtubaguy' || (github.event.pull_request.user.login == 'dependabot[bot]' && contains(steps.metadata.outputs.dependency-type, 'development'))
        run: gh pr review --approve "$PR_URL"
        env:
          PR_URL: ${{ github.event.pull_request.html_url }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Enable auto-merge for dev dependency patch/minor updates
        if: github.event.pull_request.user.login == 'dependabot[bot]' && contains(steps.metadata.outputs.dependency-type, 'development') && (steps.metadata.outputs.update-type == 'version-update:semver-patch' || steps.metadata.outputs.update-type == 'version-update:semver-minor')
        run: gh pr merge --auto --squash "$PR_URL"
        env:
          PR_URL: ${{ github.event.pull_request.html_url }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
